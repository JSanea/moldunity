<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
        body {
            background-color: white;
            color: #0056b3;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 50px; /* Moves the form closer to the top */
            border-color: #0056b3;
        }

        .login-container {
            background-color: #ffffff00;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 300px; /* Set a maximum width */
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #0056b3;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            border-color: #0056b3;
        }

        input[type="text"], input[type="password"] {
            background-color: #fff;
            color: black;
        }

        input[type="submit"] {
            background-color: #0056b3;
            color: white;
            cursor: pointer;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            width: 100%; /* Makes the button the same width as the inputs */
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            body {
                padding-top: 20px; /* Reduced space on smaller screens */
            }

            .login-container {
                padding: 20px;
                width: 90%; /* Allow the form to take up most of the screen */
                max-width: 100%; /* Remove the max-width for small screens */
            }

            input {
                font-size: 14px; /* Slightly smaller text on mobile */
            }

            input[type="submit"] {
                font-size: 14px; /* Adjust button text size */
            }
        }
    </style>
</head>
<body>

<div class="login-container">
  <h2>Autentificare</h2>
  <form action="/login" method="post">
    <input type="username" placeholder="Username" name="username" required><br>
    <input type="password" placeholder="Password" name="password" required><br>
    <input type="submit" value="Intra">
  </form>
</div>

</body>
</html>
